---
name: Build disk images
on:
  schedule:
    - cron: '15 10 * * *'
  workflow_dispatch:

env:
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=khazar-distro" >> ${GITHUB_ENV}
          echo "DEFAULT_TAG=latest" >> ${GITHUB_ENV}

      - name: Pull image from GHCR
        run: |
          sudo podman pull ${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG}
          sudo podman tag ${IMAGE_REGISTRY}/${IMAGE_NAME}:${DEFAULT_TAG} ${IMAGE_NAME}:${DEFAULT_TAG}

      - name: Build ISO
        run: |
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v $(pwd)/output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --rootfs btrfs \
            --use-librepo=True \
            ${IMAGE_NAME}:${DEFAULT_TAG}

          sudo chown -R $USER:$USER output/
          ls -lh output/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        with:
          name: khazaros-iso
          path: output/
          retention-days: 7
